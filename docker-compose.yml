services:
  backend:
    build: .
    image: multi-agent-research-system
    container_name: agent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  frontend:
    image: multi-agent-research-system
    container_name: agent-frontend
    restart: unless-stopped
    command: >
      streamlit run frontend/app.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000/api
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg17
    container_name: research-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d research"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: